services:
  - type: web
    name: softsync
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./SoftSync-main/SoftSync.Presentation/Dockerfile
    dockerContext: ./SoftSync-main
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: softsync-db
          property: connectionString

databases:
  - name: softsync-db
    plan: free
    region: singapore
    databaseName: softsync
    user: softsync
    ipAllowList: []
