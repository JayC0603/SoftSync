services:
  - type: web
    name: softsync
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./SoftSync-main/SoftSync.Presentation/Dockerfile
    dockerContext: ./SoftSync-main
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: softsync-db
          property: connectionString
      - key: AiApi__Enabled
        value: "true"
      - key: AiApi__Provider
        value: HuggingFace
      - key: AiApi__BaseUrl
        value: https://router.huggingface.co/
      - key: AiApi__Model
        value: Qwen/Qwen3-4B-Instruct-2507:cheapest
      # Render asks for this secret during Blueprint creation/update. Never put
      # the hf_ token directly in this file.
      - key: AiApi__ApiKey
        sync: false

databases:
  - name: softsync-db
    plan: free
    region: singapore
    databaseName: softsync
    user: softsync
    ipAllowList: []
